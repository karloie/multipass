name: Re-release latest tag

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      release_skip: ${{ steps.plan.outputs.release_skip }}
      tag_release: ${{ steps.plan.outputs.tag_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Resolve latest tag
        id: plan
        run: >-
          go run github.com/karloie/shipkit/cmd/shipkit@v0.0.81 plan
          -mode=docker
          -resolve-latest-tag=true
          -image=karloie/multipass
          -sha="${{ github.sha }}"
          -owner="${{ github.repository_owner }}"
          -repo="${{ github.event.repository.name }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  publish:
    needs: plan
    if: needs.plan.outputs.release_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.plan.outputs.tag_release }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Publish Docker image
        run: make ci-release TAG=${{ needs.plan.outputs.tag_release }}
        env:
          SHIPKIT: go run github.com/karloie/shipkit/cmd/shipkit@v0.0.81
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}