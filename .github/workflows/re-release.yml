name: Re-release latest tag

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  plan:
    name: "🧭 Plan"
    runs-on: ubuntu-latest
    outputs:
      release_skip: ${{ steps.plan.outputs.release_skip }}
      tag_release: ${{ steps.plan.outputs.tag_release }}
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "🧰 Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: "🧭 Resolve latest tag"
        id: plan
        run: >-
          go run github.com/karloie/shipkit/cmd/shipkit@v0.0.82 plan
          -mode=docker
          -resolve-latest-tag=true
          -image=karloie/multipass
          -sha="${{ github.sha }}"
          -owner="${{ github.repository_owner }}"
          -repo="${{ github.event.repository.name }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  docker-build:
    name: "🐳 Docker Build"
    needs: plan
    if: needs.plan.outputs.release_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.plan.outputs.tag_release }}
      - name: "🖥️ Setup QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "🏗️ Setup Buildx"
        uses: docker/setup-buildx-action@v3
      - name: "🧰 Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: "🐳 Build Docker image"
        run: make docker-build TAG=${{ needs.plan.outputs.tag_release }}
        env:
          SHIPKIT: go run github.com/karloie/shipkit/cmd/shipkit@v0.0.82
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  docker-publish:
    name: "📦 Docker Publish"
    needs:
      - plan
      - docker-build
    if: needs.plan.outputs.release_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.plan.outputs.tag_release }}
      - name: "🖥️ Setup QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "🏗️ Setup Buildx"
        uses: docker/setup-buildx-action@v3
      - name: "🧰 Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: "📦 Publish Docker image"
        run: make docker-publish TAG=${{ needs.plan.outputs.tag_release }}
        env:
          SHIPKIT: go run github.com/karloie/shipkit/cmd/shipkit@v0.0.82
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  docker-upload:
    name: "📝 Docker Upload"
    needs:
      - plan
      - docker-publish
    if: needs.plan.outputs.release_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.plan.outputs.tag_release }}
      - name: "🧰 Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: "📝 Upload Docker Hub README"
        run: make docker-upload-readme
        env:
          SHIPKIT: go run github.com/karloie/shipkit/cmd/shipkit@v0.0.82
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}