name: Release new tag

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump for manual release (patch, minor, major)'
        required: false
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: read

jobs:
  ci:
    uses: karloie/shipkit/.github/workflows/release.yml@v0.0.79
    with:
      mode: release
      event_name: ${{ github.event_name }}
      tool_ref: v0.0.79
      image: karloie/multipass
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}