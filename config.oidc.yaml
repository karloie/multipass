# Multipass development profile for an external OIDC provider.
#
# This keeps Multipass on its normal providers:
# - auth.provider: oidc
# - authz.provider: token
#
# Switching to real OIDC should only require issuer and client changes.

server:
  port: 8080

auth:
  provider: oidc
  sessionTTL: 24h
  sessionStore:
    store: memory
  oidc:
    providerName: forgerock
    issuerUrl: http://localhost:8081
    clientId: multipass
    clientSecret: ignored-by-local-oidc
    redirectUrl: http://localhost:8080/login/generic_oauth
    scopes:
      - openid
      - profile
      - email

authz:
  enabled: true
  provider: token

  roleMappings:
    PlatformTeam:
      - dev
    ReadOnlyTestGroup:
      - man
    Reader:
      - man
    Contributor:
      - dev
    Owner:
      - admin

  groupMappings:
    admin:
      - default
      - monitoring
      - "*"
    devops:
      - monitoring
    dev:
      - default
      - monitoring
    man:
      - default
      - monitoring

pim:
  enabled: true
  defaultDuration: 30m
  roles:
    admin:
      approverGroups:
        - ManagerGroup
      maxDuration: 1h
    devops:
      approverGroups:
        - ManagerGroup
      maxDuration: 2h
    dev:
      approverGroups:
        - ManagerGroup
      maxDuration: 4h
    man:
      approverGroups:
        - ManagerGroup
      maxDuration: 8h

audit:
  enabled: false
  store: memory

backends:
  loki:
    type: prometheus
    endpoint: http://localhost:3100

  mimir:
    type: prometheus
    endpoint: http://localhost:9009

  tempo:
    type: prometheus
    endpoint: http://localhost:3200